<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satelink Documentation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <style>
    :root {
      --bg-primary: #0F172A;
      --bg-secondary: #1E293B;
      --bg-tertiary: #334155;
      --bg-elevated: #1E293B;
      --bg-hover: rgba(94, 184, 154, 0.08);
      --bg-active: rgba(94, 184, 154, 0.12);

      --accent: #5CB89A;
      --accent-dark: #408A71;
      --accent-glow: rgba(92, 184, 154, 0.15);

      --text-primary: #F1F5F9;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;

      --border: #334155;
      --border-light: #475569;

      --code-bg: #0D1117;

      --sidebar-width: 280px;
      --header-height: 64px;

      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;

      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 20px rgba(92, 184, 154, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ═══════════════════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════════════════ */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-height);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      z-index: 100;
    }

    .header-inner {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .menu-btn {
      display: none;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px;
      cursor: pointer;
      margin-right: 16px;
      transition: all 0.2s ease;
    }

    .menu-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent);
    }

    .menu-btn svg {
      width: 20px;
      height: 20px;
      stroke: var(--text-secondary);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: white;
      box-shadow: var(--shadow-glow);
    }

    .logo-text {
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: var(--text-muted);
      font-weight: 400;
      margin-left: 4px;
    }

    .search-wrapper {
      flex: 1;
      max-width: 480px;
      margin: 0 32px;
    }

    .search-box {
      position: relative;
    }

    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 16px 0 44px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-tertiary);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: var(--text-muted);
      pointer-events: none;
    }

    .search-kbd {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 4px;
    }

    .search-kbd kbd {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: inherit;
      color: var(--text-muted);
    }

    .search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-height: 400px;
      overflow-y: auto;
      display: none;
      z-index: 200;
    }

    .search-results.active {
      display: block;
      animation: slideDown 0.15s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .search-result {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s ease;
    }

    .search-result:last-child {
      border-bottom: none;
    }

    .search-result:hover {
      background: var(--bg-hover);
    }

    .search-result-title {
      font-weight: 500;
      font-size: 14px;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .search-result-group {
      font-size: 12px;
      color: var(--text-muted);
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .header-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      transition: all 0.2s ease;
    }

    .header-link:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: white;
      padding: 8px 16px;
      border-radius: var(--radius-md);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow-glow), var(--shadow-md);
    }

    /* ═══════════════════════════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════════════════════════ */
    .sidebar {
      position: fixed;
      top: var(--header-height);
      left: 0;
      width: var(--sidebar-width);
      height: calc(100vh - var(--header-height));
      background: var(--bg-primary);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px 0;
      z-index: 50;
      transition: transform 0.3s ease;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 40;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .sidebar-overlay.open {
      display: block;
      opacity: 1;
    }

    .nav-section {
      margin-bottom: 28px;
    }

    .nav-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      padding: 0 24px;
      margin-bottom: 8px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 450;
      border-left: 2px solid transparent;
      transition: all 0.15s ease;
    }

    .nav-link:hover {
      color: var(--text-primary);
      background: var(--bg-hover);
    }

    .nav-link.active {
      color: var(--accent);
      background: var(--bg-active);
      border-left-color: var(--accent);
    }

    .nav-link svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      opacity: 0.7;
    }

    /* ═══════════════════════════════════════════════════════════════
       MAIN CONTENT
    ═══════════════════════════════════════════════════════════════ */
    .main {
      margin-left: var(--sidebar-width);
      margin-top: var(--header-height);
      min-height: calc(100vh - var(--header-height));
      display: flex;
      flex-direction: column;
    }

    .content-wrapper {
      flex: 1;
      padding: 48px;
    }

    .content {
      max-width: 768px;
      margin: 0 auto;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 16px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ═══════════════════════════════════════════════════════════════
       MARKDOWN STYLES
    ═══════════════════════════════════════════════════════════════ */
    .markdown {
      font-size: 16px;
      line-height: 1.75;
    }

    .markdown h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
      color: var(--text-primary);
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .markdown h1 + p {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 32px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }

    .markdown h2 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-top: 48px;
      margin-bottom: 16px;
      color: var(--text-primary);
      scroll-margin-top: calc(var(--header-height) + 24px);
    }

    .markdown h3 {
      font-size: 18px;
      font-weight: 600;
      margin-top: 32px;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .markdown h4 {
      font-size: 16px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .markdown p {
      margin-bottom: 16px;
      color: var(--text-secondary);
    }

    .markdown a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.15s ease;
    }

    .markdown a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }

    .markdown strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .markdown ul, .markdown ol {
      margin-bottom: 16px;
      padding-left: 24px;
      color: var(--text-secondary);
    }

    .markdown li {
      margin-bottom: 8px;
    }

    .markdown li::marker {
      color: var(--accent);
    }

    .markdown blockquote {
      margin: 24px 0;
      padding: 16px 20px;
      background: var(--bg-secondary);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
    }

    .markdown blockquote p {
      margin: 0;
      color: var(--text-secondary);
    }

    .markdown code {
      font-family: 'JetBrains Mono', 'SF Mono', Monaco, Consolas, monospace;
      font-size: 0.875em;
      background: var(--bg-tertiary);
      padding: 3px 8px;
      border-radius: 4px;
      color: var(--accent);
    }

    .markdown pre {
      position: relative;
      margin: 24px 0;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .markdown pre code {
      display: block;
      padding: 20px 24px;
      background: transparent;
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.7;
      overflow-x: auto;
    }

    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text-muted);
      cursor: pointer;
      opacity: 0;
      transition: all 0.2s ease;
    }

    .markdown pre:hover .copy-btn {
      opacity: 1;
    }

    .copy-btn:hover {
      background: var(--bg-hover);
      color: var(--accent);
      border-color: var(--accent);
    }

    .copy-btn.copied {
      color: var(--accent);
      border-color: var(--accent);
    }

    .markdown table {
      width: 100%;
      margin: 24px 0;
      border-collapse: collapse;
      font-size: 14px;
    }

    .markdown th, .markdown td {
      padding: 12px 16px;
      text-align: left;
      border: 1px solid var(--border);
    }

    .markdown th {
      background: var(--bg-secondary);
      font-weight: 600;
      color: var(--text-primary);
    }

    .markdown td {
      color: var(--text-secondary);
    }

    .markdown tr:hover td {
      background: var(--bg-hover);
    }

    .markdown hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 48px 0;
    }

    .markdown img {
      max-width: 100%;
      border-radius: var(--radius-lg);
      margin: 24px 0;
    }

    /* ═══════════════════════════════════════════════════════════════
       FOOTER
    ═══════════════════════════════════════════════════════════════ */
    .footer {
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 32px 48px;
      margin-left: var(--sidebar-width);
    }

    .footer-inner {
      max-width: 768px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 24px;
    }

    .footer-links {
      display: flex;
      gap: 24px;
    }

    .footer-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s ease;
    }

    .footer-link:hover {
      color: var(--accent);
    }

    .footer-link svg {
      width: 18px;
      height: 18px;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .footer-logo {
      width: 24px;
      height: 24px;
      background: var(--accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 12px;
    }

    /* ═══════════════════════════════════════════════════════════════
       MOBILE RESPONSIVE
    ═══════════════════════════════════════════════════════════════ */
    @media (max-width: 1024px) {
      .search-kbd {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .menu-btn {
        display: flex;
      }

      .search-wrapper {
        display: none;
      }

      .header-link {
        display: none;
      }

      .sidebar {
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main {
        margin-left: 0;
      }

      .footer {
        margin-left: 0;
        padding: 24px;
      }

      .content-wrapper {
        padding: 24px;
      }

      .markdown h1 {
        font-size: 28px;
      }

      .markdown h2 {
        font-size: 20px;
        margin-top: 32px;
      }

      .footer-inner {
        flex-direction: column;
        text-align: center;
      }
    }

    /* ═══════════════════════════════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-light);
    }

    /* Selection */
    ::selection {
      background: var(--accent-glow);
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">

      <a href="#" class="logo" onclick="loadDoc('readme'); return false;">

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    const docs = [
      { id: 'readme', title: 'Introduction', group: 'Getting Started', file: './readme.md' },
      { id: 'quick-start', title: 'Quick Start', group: 'Getting Started', file: './quick-start.md' },
      { id: 'pricing', title: 'Pricing', group: 'Getting Started', file: './pricing.md' },
      { id: 'api-reference', title: 'API Reference', group: 'API Reference', file: './api-reference.md' },
      { id: 'sdk-guide', title: 'SDK Guide', group: 'API Reference', file: './sdk-guide.md' },
      { id: 'node-operators', title: 'Node Operators', group: 'Node Operators', file: './node-operators.md' },
      { id: 'settlement', title: 'Settlement', group: 'Node Operators', file: './settlement.md' },
      { id: 'faq', title: 'FAQ', group: 'Resources', file: './faq.md' },
      { id: 'integration-guide', title: 'Integration Guide', group: 'Resources', file: './integration-guide.md' }
    ];

    let docCache = {};
    let currentDoc = 'readme';

    // Configure marked
    marked.setOptions({
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true
    });

    // Load document
    async function loadDoc(docId) {
      const doc = docs.find(d => d.id === docId);
      if (!doc) return;

      currentDoc = docId;
      updateNav();
      closeSidebar();

      const container = document.getElementById('markdownContent');

      if (!docCache[docId]) {
        container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading...</div></div>';
      }

      try {
        if (!docCache[docId]) {
          const res = await fetch(doc.file);
          if (!res.ok) throw new Error('Not found');
          docCache[docId] = await res.text();
        }

        container.innerHTML = marked.parse(docCache[docId]);
        addCopyButtons();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        history.pushState(null, '', '#' + docId);
      } catch (err) {
        container.innerHTML = `<h1>Document Not Found</h1><p>Could not load <code>${doc.file}</code></p>`;
      }
    }

    // Add copy buttons
    function addCopyButtons() {
      document.querySelectorAll('.markdown pre').forEach(pre => {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.onclick = async () => {
          const code = pre.querySelector('code')?.textContent || pre.textContent;
          await navigator.clipboard.writeText(code);
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = 'Copy';
            btn.classList.remove('copied');
          }, 2000);
        };
        pre.appendChild(btn);
      });
    }

    // Update navigation
    function updateNav() {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.toggle('active', link.dataset.doc === currentDoc);
      });
    }

    // Sidebar toggle
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('open');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebarOverlay').classList.remove('open');
    }

    // Search
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');

    searchInput.addEventListener('input', async (e) => {
      const query = e.target.value.toLowerCase().trim();
      if (query.length < 2) {
        searchResults.classList.remove('active');
        return;
      }

      // Preload docs
      await Promise.all(docs.map(async doc => {
        if (!docCache[doc.id]) {
          try {
            const res = await fetch(doc.file);
            docCache[doc.id] = await res.text();
          } catch (e) {
            docCache[doc.id] = '';
          }
        }
      }));

      const results = docs.filter(doc => {
        const content = docCache[doc.id]?.toLowerCase() || '';
        return doc.title.toLowerCase().includes(query) || content.includes(query);
      });

      if (results.length) {
        searchResults.innerHTML = results.map(doc => `
          <div class="search-result" onclick="loadDoc('${doc.id}'); searchResults.classList.remove('active'); searchInput.value = '';">
            <div class="search-result-title">${doc.title}</div>
            <div class="search-result-group">${doc.group}</div>
          </div>
        `).join('');
      } else {
        searchResults.innerHTML = '<div class="search-result"><div class="search-result-title">No results</div></div>';
      }
      searchResults.classList.add('active');
    });

    // Close search on outside click
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-box')) {
        searchResults.classList.remove('active');
      }
    });

    // Keyboard shortcut
    document.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
      }
    });

    // Nav clicks
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        loadDoc(link.dataset.doc);
      });
    });

    // Hash routing
    function handleHash() {
      const hash = location.hash.slice(1);
      loadDoc(hash && docs.find(d => d.id === hash) ? hash : 'readme');
    }

    window.addEventListener('hashchange', handleHash);
    handleHash();
  </script>
