[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
evm_version = "paris"

[profile.default.fmt]
line_length = 120

# Fuse Mainnet
[rpc_endpoints]
fuse = "${FUSE_RPC_URL}"
fuse_spark = "https://rpc.fusespark.io"
localhost = "http://127.0.0.1:8545"

[etherscan]
fuse = { key = "${EXPLORER_API_KEY}", url = "https://explorer.fuse.io/api" }
