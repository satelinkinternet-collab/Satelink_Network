version: "3.8"

services:
  backend:
    build:
      context: ../../
      dockerfile: Dockerfile.backend
    container_name: satelink_backend
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - DB_URL=postgres://satelink:password@postgres:5432/satelink
      - JWT_SECRET=super_secret_jwt_key_for_dev
      - FEATURE_REAL_SETTLEMENT=false
    depends_on:
      - postgres
    volumes:
      - ../../logs:/usr/src/app/logs

  frontend:
    build:
      context: ../../
      dockerfile: Dockerfile.frontend
    container_name: satelink_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: satelink_postgres
    environment:
      - POSTGRES_USER=satelink
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=satelink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: satelink_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
