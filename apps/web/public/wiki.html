<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Documentation - Satelink Network</title>
  <meta name="description" content="Satelink Network documentation and wiki. Access guides, API reference, and tutorials.">
  <link rel="canonical" href="https://satelink.network/wiki.html">
  <meta http-equiv="refresh" content="3;url=https://github.com/Satelink-Protocol/Satelink_Network/wiki">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23408A71' rx='18' width='100' height='100'/><text x='50' y='66' font-size='48' fill='white' text-anchor='middle' font-family='system-ui' font-weight='700'>S</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #408A71;
      --accent: #5CB89A;
      --bg-base: #0B0D0F;
      --bg-subtle: #111316;
      --text-primary: #ECEDEE;
      --text-secondary: #9BA1A6;
      --border: rgba(255, 255, 255, 0.08);
      --font-sans: 'Inter', -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-sans); background: var(--bg-base); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .container { max-width: 500px; }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 32px; font-weight: 800; margin-bottom: 16px; }
    p { font-size: 18px; color: var(--text-secondary); margin-bottom: 32px; line-height: 1.6; }
    .btn { display: inline-flex; align-items: center; gap: 10px; padding: 16px 32px; background: linear-gradient(135deg, var(--accent), var(--primary)); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(92, 184, 154, 0.3); }
    .btn svg { width: 20px; height: 20px; }
    .redirect-note { margin-top: 24px; font-size: 14px; color: var(--text-secondary); }
    .back-link { margin-top: 32px; }
    .back-link a { color: var(--text-secondary); font-size: 14px; text-decoration: none; }
    .back-link a:hover { color: var(--accent); }
    .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 24px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128218;</div>
    <h1>Documentation</h1>
    <p>Our documentation has moved to GitHub Wiki for better collaboration and version control.</p>

    <a href="https://github.com/Satelink-Protocol/Satelink_Network/wiki" class="btn">
      Visit Wiki
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
    </a>

    <div class="spinner"></div>
    <p class="redirect-note">Redirecting automatically in 3 seconds...</p>

    <div class="back-link">
      <a href="index.html">&larr; Back to Homepage</a>
    </div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = 'https://github.com/Satelink-Protocol/Satelink_Network/wiki';
    }, 3000);
  </script>
</body>
</html>
