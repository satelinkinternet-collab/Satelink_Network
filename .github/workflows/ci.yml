name: CI

on:
  push:
    branches: [ "main", "stable/pre-revenue-baseline" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Run basic check
        run: node -e "console.log('CI OK')"
