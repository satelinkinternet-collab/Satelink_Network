name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm test

      - run: npm run build --workspace=dashboard
        env:
          NEXT_TELEMETRY_DISABLED: "1"
