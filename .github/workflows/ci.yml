name: CI

on:
  pull_request:
    branches: [main, develop, production-base]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm install` at the workspace root installs ALL workspaces (apps/api, apps/dashboard).
      # No `|| true` — if this fails, CI fails.
      - name: Install dependencies
        run: npm install

      - name: Run tests (root)
        run: npm test

      - name: Build dashboard (Next.js)
        run: npm run build --workspace=dashboard
        env:
          NEXT_TELEMETRY_DISABLED: "1"
