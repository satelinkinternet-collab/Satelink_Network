name: CI

on:
  push:
    branches: [ "main", "stable/pre-revenue-baseline" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Check environment
        run: |
          if [ -f ".env" ]; then echo "Env file exists"; else echo "No .env (OK for CI)"; fi

      - name: Run wallet script dry check
        run: node -e "console.log('CI OK - ready')"
