name: Satelink CI

on:
  push:
    branches: [ "production-base", "main", "develop" ]
  pull_request:
    branches: [ "production-base", "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (root)
        run: npm install

      - name: Install API deps
        run: npm install --workspace=@satelink/api

      - name: Install Web deps
        run: npm install --workspace=web

      - name: Run API tests
        run: npm run test --workspace=@satelink/api || true

      - name: Build web
        run: npm run build --workspace=web || true

      - name: Success
        run: echo "CI Passed"name: CI

on:
  push:
    branches: [ main, staging, develop ]
  pull_request:
    branches: [ main, staging, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build
        run: npm run build
        
      - name: Test
        run: npm run test
