name: contracts-ci

on:
  push:
    branches: ["main", "wip/docker-setup"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Hardhat compile
        run: npx hardhat compile

      - name: Hardhat test
        run: npx hardhat test
