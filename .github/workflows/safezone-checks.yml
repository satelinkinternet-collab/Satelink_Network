name: Safe-Zone Checks

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  run-checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: satelink
          POSTGRES_PASSWORD: satelinkpass
          POSTGRES_DB: satelink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Start server (Background)
      run: |
        npm run start &
        echo $! > server.pid
        sleep 10
      env:
        PORT: 8080
        NODE_ENV: development
        SATELINK_MODE: simulation
        JWT_SECRET: ci_safezone_secret_key_64chars_long_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        JWT_REFRESH_SECRET: ci_safezone_refresh_key_64chars_long_bbbbbbbbbbbbbbbbbbbbbbbbb
        DATABASE_URL: postgresql://satelink:satelinkpass@localhost:5432/satelink
        REDIS_HOST: localhost
        REDIS_URL: redis://localhost:6379
        FEATURE_REAL_SETTLEMENT: "false"
        FEATURE_MOONPAY: "false"

    - name: Run Smoke Safe-Zone
      run: node scripts/smoke_safezone.js
      env:
        API_BASE_URL: http://localhost:8080

    - name: Run Readiness Gate
      run: node scripts/readiness_gate.js
      env:
        API_BASE_URL: http://localhost:8080

    - name: Shutdown server
      if: always()
      run: kill $(cat server.pid) || true
