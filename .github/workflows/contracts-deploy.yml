name: contracts-deploy

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: true
        default: 'fuse_sparknet'
        type: choice
        options:
          - fuse_sparknet
          - fuse_mainnet

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Hardhat compile
        run: npx hardhat compile

      # This is a scaffold. We do not need to provide a private key here.
      # The deploy script can be invoked, but actual transaction signing
      # for admin operations will be routed through the Relayer using Defender API keys.
      - name: Trigger Deployment via Defender API
        run: |
          echo "Deploying to ${{ inputs.network }}..."
          # Example command when actual deploy script is ready:
          # npx hardhat run scripts/deploy_settlement.js --network ${{ inputs.network }}
        env:
          # Only API tokens provided here (no Private Keys)
          DEFENDER_KEY: ${{ secrets.DEFENDER_KEY }}
          DEFENDER_SECRET: ${{ secrets.DEFENDER_SECRET }}
          # Need these for the relayer driver or network config
          FUSE_MAINNET_RPC_URL: ${{ secrets.FUSE_MAINNET_RPC_URL }}
          FUSE_SPARKNET_RPC_URL: ${{ secrets.FUSE_SPARKNET_RPC_URL }}
