name: E2E Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: satelink
          POSTGRES_PASSWORD: satelinkpass
          POSTGRES_DB: satelink
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          PORT=8080
          NODE_ENV=test
          JWT_SECRET=ci_e2e_secret_key_64chars_long_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET=ci_e2e_refresh_secret_key_64chars_long_bbbbbbbbbbbbbbbbbbbbbbb
          DATABASE_URL=postgresql://satelink:satelinkpass@localhost:5432/satelink
          REDIS_HOST=localhost
          REDIS_URL=redis://localhost:6379
          FEATURE_REAL_SETTLEMENT=false
          FEATURE_MOONPAY=false
          EOF

      - name: Run E2E
        run: npm test
