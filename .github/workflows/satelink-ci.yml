name: Satelink CI/CD

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

jobs:
  # ═══════════════════════════════════════════
  # JOB 1: Smart Contracts (Foundry)
  # ═══════════════════════════════════════════
  contracts:
    name: Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Needed for Foundry libs (OpenZeppelin)

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Build contracts
        run: forge build

      - name: Run tests
        run: forge test -vv

      - name: Run gas report
        run: forge test --gas-report

      - name: Check formatting
        run: forge fmt --check

  # ═══════════════════════════════════════════
  # JOB 2: Backend (Node.js)
  # ═══════════════════════════════════════════
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create test .env
        run: |
          cat > .env << EOF
          PORT=8080
          NODE_ENV=test
          JWT_SECRET=ci_test_secret_key_64chars_long_aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET=ci_test_refresh_secret_key_64chars_long_bbbbbbbbbbbbbbbbbbbbb
          SQLITE_PATH=./test_satelink.db
          FEATURE_REAL_SETTLEMENT=false
          FEATURE_MOONPAY=false
          EOF

      - name: Run migrations
        run: npm run migrate 2>/dev/null || node scripts/migrate.js

      - name: Run backend tests
        run: npm test

  # ═══════════════════════════════════════════
  # JOB 3: Frontend (Next.js)
  # ═══════════════════════════════════════════
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: cd web && npm ci

      - name: Build frontend
        run: cd web && npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8080

      - name: Run frontend tests
        run: cd web && npm test -- --passWithNoTests

  # ═══════════════════════════════════════════
  # JOB 4: Deploy Contracts to Fuse Spark (Testnet)
  # Only runs on push to 'staging' branch
  # ═══════════════════════════════════════════
  deploy-contracts-testnet:
    name: Deploy to Fuse Spark
    runs-on: ubuntu-latest
    needs: [contracts, backend, frontend]  # All tests must pass first
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Deploy to Fuse Spark Testnet
        run: |
          forge script script/Deploy.s.sol \
            --rpc-url https://rpc.fusespark.io \
            --broadcast \
            --slow
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}

  # ═══════════════════════════════════════════
  # JOB 5: Deploy Contracts to Fuse Mainnet
  # Only runs on push to 'main' branch
  # ═══════════════════════════════════════════
  deploy-contracts-mainnet:
    name: Deploy to Fuse Mainnet
    runs-on: ubuntu-latest
    needs: [contracts, backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Deploy to Fuse Mainnet
        run: |
          forge script script/Deploy.s.sol \
            --rpc-url https://rpc.fuse.io \
            --broadcast \
            --verify \
            --slow
        env:
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY_MAINNET }}
          EXPLORER_API_KEY: ${{ secrets.FUSE_EXPLORER_API_KEY }}
