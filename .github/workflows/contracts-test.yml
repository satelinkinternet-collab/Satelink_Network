name: Contracts CI

# Trigger on pushes to main and any feature/wip branch,
# and on all PRs targeting main — but only when contract-related
# files change to avoid burning CI minutes on unrelated commits.
on:
  push:
    branches:
      - main
      - "wip/**"
      - "feature/**"
    paths:
      - "contracts/**"
      - "test/**"
      - "scripts/deploy_settlement.js"
      - "scripts/smoke_settlement.js"
      - "hardhat.config.js"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches:
      - main
    paths:
      - "contracts/**"
      - "test/**"
      - "scripts/deploy_settlement.js"
      - "scripts/smoke_settlement.js"
      - "hardhat.config.js"
      - "package.json"
      - "package-lock.json"

jobs:
  test:
    name: Hardhat — compile · test · smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Compile first so test failures are clearly compilation vs. logic errors.
      - name: Compile contracts
        run: npx hardhat compile

      # Unit + integration tests (Hardhat in-memory network, no external RPCs).
      - name: Run contract tests
        run: npx hardhat test
        env:
          # Explicit network keeps logs clean; Hardhat defaults to this anyway.
          HARDHAT_NETWORK: hardhat

      # Full end-to-end smoke: deploy → fund vault → create claim → claim → withdraw.
      # The settlement scripts use ethers.JsonRpcProvider, so we need a Hardhat
      # node running on localhost:8545. Start it in the background, wait for the
      # port, then run the smoke script via node (no separate Hardhat runner needed).
      - name: Start Hardhat node (background)
        run: npx hardhat node &
        # Give the node a few seconds to bind its port before we hit it.

      - name: Wait for Hardhat node
        run: npx wait-on tcp:8545 --timeout 30000
        # wait-on is included transitively by many test setups; if not available,
        # fall back to a simple sleep below.
        continue-on-error: true

      - name: Wait for Hardhat node (fallback)
        run: sleep 5

      - name: Smoke test — settlement contracts
        run: node scripts/smoke_settlement.js
        env:
          RPC_URL: http://127.0.0.1:8545

      # Upload compiled artifacts so downstream jobs or release pipelines
      # can consume the ABI + bytecode without re-compiling.
      - name: Upload compiled artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compiled-contracts
          path: artifacts/
          retention-days: 7
