name: contracts-ci

on:
  push:
    branches: ["main", "integration/full-product"]
  pull_request:

jobs:
  foundry:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: forge build
        run: forge build

      - name: forge test
        run: forge test -vvv
