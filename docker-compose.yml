version: '3.8'

services:
  satelink-core:
    build: .
    container_name: satelink-core
    environment:
      - NODE_ENV=production
      - PORT=8080
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    volumes:
      - satelink-data:/usr/src/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - database
      - redis

  satelink-gateway:
    build: .
    container_name: satelink-gateway
    command: npm run gateway
    environment:
      - NODE_ENV=production
      - PORT=8081
      - LOG_LEVEL=info
    ports:
      - "8081:8081"
    volumes:
      - satelink-data:/usr/src/app/data
    restart: unless-stopped
    depends_on:
      - satelink-core

  satelink-node-worker:
    build: .
    container_name: satelink-node-worker
    command: npm run worker
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - WORKER_INTERVAL_MS=10000
    volumes:
      - satelink-data:/usr/src/app/data
    restart: unless-stopped
    depends_on:
      - database
      - redis

  database:
    # We provision a PostgreSQL database as requested for production readiness.
    # The application currently uses better-sqlite3 heavily, but this establishes
    # the container architecture for the upcoming migration.
    image: postgres:15-alpine
    container_name: satelink-db
    environment:
      POSTGRES_USER: satelink
      POSTGRES_PASSWORD: satelinkpassword
      POSTGRES_DB: satelink_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U satelink" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: satelink-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  satelink-data:
  postgres-data:
