version: '3.8'

services:
  satelink-core:
    build: .
    container_name: satelink-core
    environment:
      - NODE_ENV=development
      - PORT=8080
      - LOG_LEVEL=info
      - JWT_SECRET=devsecret_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abc
      - DB_TYPE=postgres
      - REDIS_HOST=satelink-redis
      - REDIS_PORT=6379
      - FEATURE_REAL_SETTLEMENT=true
      - SATELINK_MODE=production
      - DATABASE_URL=postgres://satelink:satelinkpass@satelink-db:5432/satelink
      - FUSE_USDT_CONTRACT=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - FUSE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - FUSE_RPC_URL=http://host.docker.internal:8545
      - FUSE_CHAIN_ID=31337

    ports:
      - "8080:8080"
    volumes:
      - satelink-data:/usr/src/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  satelink-gateway:
    build: .
    container_name: satelink-gateway
    command: npm run gateway
    environment:
      - NODE_ENV=development
      - PORT=8081
      - LOG_LEVEL=info
      - JWT_SECRET=devsecret_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abc
      - DB_TYPE=postgres
      - REDIS_HOST=satelink-redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgres://satelink:satelinkpass@satelink-db:5432/satelink
    ports:
      - "8081:8081"
    volumes:
      - satelink-data:/usr/src/app/data
    restart: unless-stopped
    depends_on:
      - satelink-core

  satelink-node-worker:
    build: .
    container_name: satelink-node-worker
    command: npm run worker
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=info
      - WORKER_INTERVAL_MS=10000
      - JWT_SECRET=devsecret_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abc
      - DB_TYPE=postgres
      - REDIS_HOST=satelink-redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgres://satelink:satelinkpass@satelink-db:5432/satelink
      - FEATURE_REAL_SETTLEMENT=true
      - FUSE_USDT_CONTRACT=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - FUSE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - FUSE_RPC_URL=http://host.docker.internal:8545
      - FUSE_CHAIN_ID=31337
    volumes:
      - satelink-data:/usr/src/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  database:
    image: postgres:15-alpine
    container_name: satelink-db
    environment:
      POSTGRES_USER: satelink
      POSTGRES_PASSWORD: satelinkpass
      POSTGRES_DB: satelink
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U satelink" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: satelink-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  satelink-data:
  postgres-data:
