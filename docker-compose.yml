version: '3.8'

x-common-env: &common-env
  NODE_ENV: production
  DATABASE_URL: postgresql://satelink:satelinkpassword@database:5432/satelink_prod
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
  IP_HASH_SALT: ${IP_HASH_SALT:?IP_HASH_SALT is required}
  PASSWORD_SALT: ${PASSWORD_SALT:?PASSWORD_SALT is required}
  ADMIN_API_KEY: ${ADMIN_API_KEY:?ADMIN_API_KEY is required}
  FEATURE_REAL_SETTLEMENT: ${FEATURE_REAL_SETTLEMENT:-false}
  SETTLEMENT_INTERVAL_MS: ${SETTLEMENT_INTERVAL_MS:-60000}
  EPOCH_DURATION: ${EPOCH_DURATION:-3600}
  FLYWHEEL_ENABLED: ${FLYWHEEL_ENABLED:-true}

services:
  # ── API Server ──
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: satelink-api
    environment:
      - NODE_ENV=development
      - PORT=8080
      - LOG_LEVEL=info
      - JWT_SECRET=devsecret_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abc
      - DB_TYPE=postgres
      - REDIS_HOST=satelink-redis
      - REDIS_PORT=6379
      - FEATURE_REAL_SETTLEMENT=true
      - SATELINK_MODE=production
      - DATABASE_URL=postgres://satelink:satelinkpass@satelink-db:5432/satelink
      - FUSE_USDT_CONTRACT=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - FUSE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - FUSE_RPC_URL=http://host.docker.internal:8545
      - FUSE_CHAIN_ID=31337

    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Background Worker ──
  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: satelink-worker
    command: node apps/api/worker.js
    environment:
      - NODE_ENV=development
      - PORT=8081
      - LOG_LEVEL=info
      - JWT_SECRET=devsecret_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abc
      - DB_TYPE=postgres
      - REDIS_HOST=satelink-redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgres://satelink:satelinkpass@satelink-db:5432/satelink
    ports:
      - "8081:8081"
    volumes:
      - satelink-data:/usr/src/app/data
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Dashboard (Next.js) ──
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: satelink-dashboard
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=info
      - WORKER_INTERVAL_MS=10000
      - JWT_SECRET=devsecret_0123456789abcdef0123456789abcdef0123456789abcdef0123456789abc
      - DB_TYPE=postgres
      - REDIS_HOST=satelink-redis
      - REDIS_PORT=6379
      - DATABASE_URL=postgres://satelink:satelinkpass@satelink-db:5432/satelink
      - FEATURE_REAL_SETTLEMENT=true
      - FUSE_USDT_CONTRACT=0x5FbDB2315678afecb367f032d93F642f64180aa3
      - FUSE_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - FUSE_RPC_URL=http://host.docker.internal:8545
      - FUSE_CHAIN_ID=31337
    volumes:
      - satelink-data:/usr/src/app/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── PostgreSQL ──
  database:
    image: postgres:15-alpine
    container_name: satelink-db
    environment:
      POSTGRES_USER: satelink
      POSTGRES_PASSWORD: satelinkpass
      POSTGRES_DB: satelink
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satelink"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: satelink-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:latest
    container_name: satelink-prometheus
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      - api

  # ── Grafana ──
  grafana:
    image: grafana/grafana:latest
    container_name: satelink-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-satelink}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./infra/monitoring/grafana:/etc/grafana/provisioning/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
