services:
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - SQLITE_PATH=/data/satelink.db
    volumes:
      - ../../data:/data
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: ../../
      dockerfile: apps/dashboard/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8080
    depends_on:
      - api

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=satelink
      - POSTGRES_PASSWORD=satelink
      - POSTGRES_DB=satelink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
