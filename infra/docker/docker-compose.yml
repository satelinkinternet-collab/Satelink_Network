services:
  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
      - PORT=8080
      - RUN_CONTEXT=docker
      - DOCKER_ENV=true
      # Connection strings use Docker service names — NOT 127.0.0.1
      - DATABASE_URL=postgresql://satelink:satelinkpass@postgres:5432/satelink
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: ../../
      dockerfile: apps/dashboard/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8080
    depends_on:
      - api

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=satelink
      - POSTGRES_PASSWORD=satelinkpass
      - POSTGRES_DB=satelink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
